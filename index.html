<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M8U3 GS Scan Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; background: #101018; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #status { position: absolute; top: 15px; left: 15px; color: #0f0; font-family: monospace; z-index: 100; font-size: 14px;}
  </style>
  <!-- Load standard UMD library to bypass Module/CORS parsing issues -->
  <script src="https://unpkg.com/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.umd.js"></script>
</head>
<body>
  <div id="status">Initializing Viewer...</div>
  
  <script>
    const statusEl = document.getElementById('status');
    
    // Validate that the script loaded and the encoder is available
    if (typeof GaussianSplats3D === 'undefined') {
        statusEl.style.color = '#f55';
        statusEl.innerText = "Fatal Error: Parser library failed to load from CDN.";
    } else {
        statusEl.innerText = "Loading 3D Gaussian Splatting data...";
        
        const viewer = new GaussianSplats3D.Viewer({
            cameraUp: [0, 1, 0],
            initialCameraPosition: [5, 3, 6], // Camera pulled back to prevent clipping
            initialCameraLookAt: [0, 1, 0],
            gpuAcceleratedSort: true
        });

        // Add the scene with dynamic format inference (No explicit PLY forcing)
        viewer.addSplatScene('livingroom_clean.ply', {
            showLoadingUI: true
        })
        .then(() => {
            statusEl.style.color = '#afa';
            statusEl.innerText = "Data Loaded Successfully.";
            setTimeout(() => { statusEl.style.display = 'none'; }, 2500);
            viewer.start();
        })
        .catch((err) => {
            statusEl.style.color = '#f55';
            statusEl.innerText = "Rendering Error: " + err;
            console.error("Viewer exception:", err);
        });
    }
  </script>
</body>
</html>
