<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M8U3 GS Scan Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; background: #101018; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #status { position: absolute; top: 15px; left: 15px; color: #0f0; font-family: monospace; z-index: 100; font-size: 14px;}
  </style>
  <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
  <script type="importmap">
  { "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "@mkkellogg/gaussian-splats-3d": "https://unpkg.com/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js"
  }}
  </script>
</head>
<body>
  <div id="status">Loading Viewer and ES Modules...</div>
  
  <script type="module">
    import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';

    const statusEl = document.getElementById('status');
    statusEl.innerText = "Library loaded. Decoding 3DGS data...";

    try {
        const viewer = new GaussianSplats3D.Viewer({
            cameraUp: [0, 1, 0],
            initialCameraPosition: [5, 3, 6], // הרחקת מוקד המצלמה למניעת חיתוך גיאומטרי
            initialCameraLookAt: [0, 1, 0],
            gpuAcceleratedSort: true
        });

        // טעינת הקובץ ללא הגדרת פורמט קשיחה (מאפשר זיהוי נתונים דחוסים באופן אוטומטי)
        viewer.addSplatScene('livingroom_clean.ply', {
            showLoadingUI: true
        })
        .then(() => {
            statusEl.style.color = '#afa';
            statusEl.innerText = "Data Loaded Successfully.";
            setTimeout(() => { statusEl.style.display = 'none'; }, 2500);
            viewer.start();
        })
        .catch((err) => {
            statusEl.style.color = '#f55';
            statusEl.innerText = "Rendering Error: " + err;
            console.error("Viewer exception:", err);
        });
    } catch (e) {
        statusEl.style.color = '#f55';
        statusEl.innerText = "Initialization Error: " + e.message;
    }
  </script>
</body>
</html>
